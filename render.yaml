services:
  - type: web
    name: stock-trader-web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_ALLOWED_HOSTS
        value: stock-trader-tdvu.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://stock-trader-tdvu.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stock-trader-db
          property: connectionString

  - type: worker
    name: stock-trader-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py run_scheduler --username mprov --watchlist Default --max-symbols 25 --throttle-seconds 12
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_ALLOWED_HOSTS
        value: stock-trader-tdvu.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://stock-trader-tdvu.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stock-trader-db
          property: connectionString

databases:
  - name: stock-trader-db
    databaseName: stock_trader
    user: stock_trader
