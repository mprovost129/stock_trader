services:
  - type: web
    name: stock-trader-web
    runtime: python
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py ensure_db_schema &&
      python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --worker-class gthread --workers 1 --threads 2 --timeout 60 --graceful-timeout 30 --keep-alive 5 --max-requests 500 --max-requests-jitter 50
    healthCheckPath: /health/
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_ALLOWED_HOSTS
        value: stock-trader-tdvu.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://stock-trader-tdvu.onrender.com
      - key: DJANGO_SECRET_KEY
        sync: false          # set once in Render dashboard — shared with worker via env group
      - key: DATABASE_URL
        fromDatabase:
          name: stock-trader-db
          property: connectionString
      - key: POLYGON_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: ALERT_MIN_SCORE_EVENT
        value: "80"
      - key: ALERT_MIN_SCORE_STATE
        value: "60"
      - key: ALERT_MAX_PER_DAY
        value: "12"
      - key: SCHEDULER_MAX_SYMBOLS_PER_CYCLE
        value: "25"
      - key: DJANGO_DB_SCHEMA
        value: stock_trader   # isolates all tables in their own schema; other apps keep using public

  - type: worker
    name: stock-trader-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py run_scheduler --username mprov --watchlist Default --max-symbols 25 --throttle-seconds 12 --iterations 0
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_ALLOWED_HOSTS
        value: stock-trader-tdvu.onrender.com
      - key: DJANGO_SECRET_KEY
        sync: false          # must match the web service value
      - key: DATABASE_URL
        fromDatabase:
          name: stock-trader-db
          property: connectionString
      - key: POLYGON_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: ALERT_MIN_SCORE_EVENT
        value: "80"
      - key: ALERT_MIN_SCORE_STATE
        value: "60"
      - key: ALERT_MAX_PER_DAY
        value: "12"
      - key: SCHEDULER_MAX_SYMBOLS_PER_CYCLE
        value: "25"
      - key: DJANGO_DB_SCHEMA
        value: stock_trader

databases:
  - name: stock-trader-db
    databaseName: stock_trader
    user: stock_trader
