{% extends "base.html" %}

{% block title %}Record Decision{% endblock %}

{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h1 class="h3 mb-1">Record Decision</h1>
      <div class="text-muted small">{{ signal.instrument.symbol }} • {{ signal.strategy.name }} • {{ signal.timeframe }} • {{ signal.direction }}</div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-sm btn-outline-secondary" href="{% url 'signals:detail' signal.pk %}">Back</a>
      <a class="btn btn-sm btn-outline-secondary" href="{% url 'journal:list' %}">Journal</a>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Save</button>
      </form>
    </div>
  </div>
{% endblock %}
